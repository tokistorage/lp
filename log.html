/* Timeline */
.timeline {
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--accent), transparent);
  opacity: 0.3;
}

.post {
  padding: 0 0 40px 28px;
  position: relative;
  animation: fadeIn 0.4s ease both;
}

.post::before {
  content: '';
  position: absolute;
  left: -3px;
  top: 6px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.6;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.post-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.post-date {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.post-tag {
  font-family: 'DM Mono', monospace;

  color: var(--accent);
  background: var(--tag);
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.08em;

.post-body {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Empty state */
.empty {
  padding: 60px 0;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em;
}

/* Loading */
.loading {
  padding: 60px 0;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.15em;
}

.loading::after {
  content: '';
  animation: dots 1.2s infinite;
}

@keyframes dots {
  0%,20% { content: '.'; }
  40% { content: '..'; }
  60%,100% { content: '...'; }
}

footer {

  margin-top: 24px;

  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
}

  <script>
    async function loadPosts() {
      const timeline = document.getElementById('timeline');
      try {
        const res = await fetch('posts.json?t=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const posts = await res.json();

        if (!posts.length) {
          timeline.innerHTML = '<div class="empty">no posts yet</div>';
          return;
        }

        // 新しい順に表示
        const sorted = [...posts].reverse();

        timeline.innerHTML = sorted.map((p, i) => `
          <div class="post" style="animation-delay:${i * 0.05}s">
            <div class="post-meta">
              <span class="post-date">${formatDate(p.date)}</span>
              ${p.tag ? `<span class="post-tag">${p.tag}</span>` : ''}
            </div>
            <div class="post-body">${escapeHtml(p.body)}</div>
          </div>
        `).join('');
      } catch (e) {
        timeline.innerHTML = '<div class="empty">no posts yet</div>';
      }
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${y}.${m}.${day} ${h}:${min}`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadPosts();
  </script>
